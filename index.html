<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <title>GoSlide</title>
</head>
<body>
    
    <header class="header">

            <a href="#" target="_blank" rel="noopener noreferrer" class="header__nav-logo">GoSlide</a>

            <nav class="header__nav">
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Overview</a>
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Features</a>
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Techology</a>
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Design</a>
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Review</a>
                    <a class="header__nav-item" href="#" target="_blank" rel="noopener noreferrer">Pricing</a>
            </nav>

            <div class="header__nav-btn button">order now</div>

        </header>

        <section class="hero">
            <div class="container">

                <h1 class="hero__title">SLIDE CONTROL</h1>

                <img src="./image/hero_mouse.png" alt="Mouse" class="hero__mouse-img">

                <div class="hero__info">

                    <div class="hero__info-data">
                        <dl class="hero__info-table">
                            <dt class="hero__info-table-title">weight</dt>
                            <dd class="hero__info-table-data">55g</dd>
                        </dl>
                    </div>

                    <div class="hero__info-data">
                        <dl class="hero__info-table table-right">
                            <dt class="hero__info-table-title">resolution</dt>
                            <dd class="hero__info-table-data">100-20 000 DPI</dd>
                        </dl>
                    </div>

                </div>

                <div class="hero__footer">
                    <a class="hero__bottom-btn button btn-shadow">play video</a>
                </div>
                
            </div>
        </section>


        <section class="srction"></section>

</body>
